function formatMoney(v) {
  if (v >= 1e9) return '$' + (v/1e9).toFixed(2) + 'B';
  if (v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return '$' + (v/1e3).toFixed(1) + 'K';
  return '$' + Math.round(v).toLocaleString();
}
function formatPct(v) { return (v >= 0 ? '+' : '') + v.toFixed(0) + '%'; }
function escapeHtml(str) { return String(str).replace(/[&<>\"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s])); }
function maxBy(arr, key){ return Math.max(...arr.map(x => x[key])); }

function interpolateLogBudget(budget, values) {
  const x = Math.log(Math.max(500000, Math.min(380000000, budget)));
  const breaks = APP_DATA.budgetBreakpoints;
  const logs = breaks.map(b => Math.log(b));
  if (x <= logs[0]) return values[0];
  if (x >= logs[logs.length - 1]) return values[values.length - 1];
  for (let i = 0; i < logs.length - 1; i++) {
    if (x >= logs[i] && x <= logs[i + 1]) {
      const t = (x - logs[i]) / (logs[i + 1] - logs[i]);
      return values[i] + t * (values[i + 1] - values[i]);
    }
  }
  return values[values.length - 1];
}

function predictRevenue() {
  const rawGenre = state.selectedGenres[0] || 'Drama';
  const rawStudio = state.selectedStudio || 'Warner Bros.';
  const genre = APP_DATA.lookup[rawGenre] ? rawGenre : 'Drama';
  const studio = rawStudio === 'Other' ? 'Warner Bros.' : rawStudio;
  const table = APP_DATA.lookup[genre] || APP_DATA.lookup['Drama'];
  const curve = (table && table[studio]) ? table[studio] : table[Object.keys(table)[0]];
  let pred = interpolateLogBudget(state.budget, curve);
  pred *= MONTH_MULTIPLIERS[state.month] || 1;
  pred *= 1 + ((state.runtime - 107) / 500);
  if (state.selectedGenres.length > 1) pred *= 1 + Math.min(0.08, (state.selectedGenres.length - 1) * 0.02);
  if (state.selectedLanguage && state.selectedLanguage !== 'en') pred *= 0.93;

  if (state.predictionMode === 'post') {
    const voteBoost = 1 + Math.min(0.55, Math.log10(Math.max(1, state.voteCount)) * 0.11);
    const ratingBoost = 1 + ((Math.max(0, Math.min(10, state.voteAverage)) - 5) * 0.045);
    const popularityBoost = 1 + Math.min(0.6, Math.log1p(Math.max(0, state.popularity)) * 0.12);
    pred *= voteBoost * ratingBoost * popularityBoost;
  }

  pred = Math.max(100000, pred);

  const profit = pred - state.budget;
  const roi = state.budget > 0 ? (profit / state.budget) * 100 : 0;
  const badge = roi > 100 ? 'Blockbuster potential' : roi > 0 ? 'Profitable outlook' : 'Loss-making risk';
  const badgeColor = roi > 100 ? '#e50914' : roi > 0 ? '#2d7d46' : '#7a2f2f';
  const genreAvg = (genreStats.find(g => g.genre === rawGenre) || genreStats[0]).avgRevenue;
  const monthAvg = monthStats[state.month - 1].avg;

  state.prediction = {
    revenue: pred,
    profit,
    roi,
    badge,
    badgeColor,
    genre,
    studio,
    language: state.selectedLanguage || 'en',
    genreAvg,
    monthAvg,
    budgetMultiple: pred / Math.max(1, state.budget),
    recordShare: (pred / APP_DATA.metrics.record_revenue) * 100,
    genreShare: (pred / genreAvg) * 100,
    roiShare: Math.max(0, Math.min(100, roi > 0 ? Math.min(roi, 400) / 4 : 0))
  };
}

              <div style="font-size:14px; color:#ffffff;">${state.runtime} min</div>

          </div>
          <div>

          </div>
          <div>
            <div style="font-size:14px; color:#b3b3b3; margin-bottom:10px;">Studio (single-select)</div>
            ${renderChips(APP_DATA.topCompanies, state.selectedStudio, false, 'selectStudio')}
          </div>
          <div>
            <div style="font-size:14px; color:#b3b3b3; margin-bottom:10px;">Language (single-select)</div>
            ${renderChips(APP_DATA.topLangs, state.selectedLanguage, false, 'selectLanguage')}
          </div>
          ${state.predictionMode === 'post' ? `
          <div style="background:#111111; border:1px solid #2c2c2c; border-radius:16px; padding:16px; display:grid; gap:16px;">
            <div style="font-size:15px; color:#ffffff; font-weight:800;">Post-release inputs</div>
            <div>
              <div style="display:flex; justify-content:space-between; gap:12px; margin-bottom:8px;">
                <div style="font-size:14px; color:#b3b3b3;">Vote count</div>
                <div style="font-size:14px; color:#ffffff;">${state.voteCount.toLocaleString()}</div>
              </div>
              <input type="range" min="0" max="200000" step="100" value="${state.voteCount}" oninput="updateVoteCount(this.value)" style="width:100%;">
            </div>
            <div>
              <div style="display:flex; justify-content:space-between; gap:12px; margin-bottom:8px;">
                <div style="font-size:14px; color:#b3b3b3;">Vote average</div>
                <div style="font-size:14px; color:#ffffff;">${Number(state.voteAverage).toFixed(1)}</div>
              </div>
              <input type="range" min="0" max="10" step="0.1" value="${state.voteAverage}" oninput="updateVoteAverage(this.value)" style="width:100%;">
            </div>
            <div>
              <div style="display:flex; justify-content:space-between; gap:12px; margin-bottom:8px;">
                <div style="font-size:14px; color:#b3b3b3;">Popularity</div>
                <div style="font-size:14px; color:#ffffff;">${Number(state.popularity).toFixed(0)}</div>
              </div>
              <input type="range" min="0" max="250" step="1" value="${state.popularity}" oninput="updatePopularity(this.value)" style="width:100%;">
            </div>
          </div>
          ` : ''}
          <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:6px;">
            <button onclick="runPrediction()" style="background:#e50914; color:#ffffff; border:none; border-radius:14px; padding:14px 18px; font-size:16px; font-weight:800; cursor:pointer;">Predict revenue</button>
            <button onclick="resetForm()" style="background:#2a2a2a; color:#ffffff; border:1px solid #404040; border-radius:14px; padding:14px 18px; font-size:16px; font-weight:700; cursor:pointer;">Reset</button>
          </div>
        </div>
      </div>

      <div style="background:#1b1b1b; border:1px solid #2a2a2a; border-radius:20px; padding:24px;">
        <div style="font-size:15px; color:#b3b3b3; margin-bottom:8px;">Projected worldwide gross</div>
        <div style="font-size:46px; font-weight:900; color:#ffffff; line-height:1.1; margin-bottom:12px;">${p ? formatMoney(p.revenue) : '$0'}</div>
        <div style="display:inline-block; background:${p ? p.badgeColor : '#3a3a3a'}; color:#ffffff; border-radius:999px; padding:9px 14px; font-size:14px; font-weight:800; margin-bottom:18px;">${p ? p.badge : 'Awaiting prediction'}</div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:22px;">
          ${[
            ['Budget', formatMoney(state.budget)],
            ['Revenue', p ? formatMoney(p.revenue) : '$0'],
            ['Net profit', p ? formatMoney(p.profit) : '$0'],
            ['ROI', p ? formatPct(p.roi) : '0%']
          ].map(([label,val]) => `
            <div style="background:#111111; border:1px solid #2c2c2c; border-radius:16px; padding:16px;">
              <div style="font-size:13px; color:#9a9a9a; margin-bottom:8px;">${label}</div>
              <div style="font-size:22px; font-weight:800; color:#ffffff;">${val}</div>
            </div>
          `).join('')}
        </div>

        <div style="margin-bottom:22px;">
          <div style="font-size:16px; font-weight:800; margin-bottom:12px;">Benchmarks</div>
          ${p ? [
            { label:'Vs all-time record', pct: Math.min(100, p.recordShare), text: p.recordShare.toFixed(1) + '% of Avatar' },
            { label:'Vs genre average', pct: Math.min(100, p.genreShare), text: p.genreShare.toFixed(1) + '% of genre avg' },
            { label:'Return on budget', pct: Math.min(100, p.roiShare), text: formatPct(p.roi) + ' ROI' }
          ].map(row => `
            <div style="margin-bottom:14px;">
              <div style="display:flex; justify-content:space-between; gap:12px; font-size:13px; margin-bottom:6px; color:#cfcfcf;"><span>${row.label}</span><span>${row.text}</span></div>
              <div style="height:12px; background:#2a2a2a; border-radius:999px; overflow:hidden;">
                <div style="height:12px; width:${row.pct}%; background:#e50914; border-radius:999px; transition:width 700ms ease;"></div>
              </div>
            </div>
          `).join('') : '<div style="color:#9a9a9a; font-size:14px;">Run a prediction to see benchmark bars.</div>'}
        </div>

        <div>
          <div style="font-size:16px; font-weight:800; margin-bottom:12px;">Context</div>
          <table style="width:100%; border-collapse:collapse; font-size:14px;">
            <tbody>
              ${[
                ['Genre avg', p ? formatMoney(p.genreAvg) : '—'],
                ['Month historical avg', p ? formatMoney(p.monthAvg) : '—'],
                ['Studio selected', state.selectedStudio || 'Other'],
                ['Budget multiple', p ? p.budgetMultiple.toFixed(2) + '×' : '—']
              ].map(([a,b], idx) => `
                <tr style="border-top:${idx===0 ? '1px solid #2c2c2c' : '1px solid #2c2c2c'};">
                  <td style="padding:12px 8px 12px 0; color:#9a9a9a;">${a}</td>
                  <td style="padding:12px 0; color:#ffffff; text-align:right; font-weight:700;">${b}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function barSvg(data, valueKey, highlightFn) {
  const width = 900, height = 300, pad = 28;
  const max = Math.max(...data.map(d => d[valueKey]));
  const barW = (width - pad * 2) / data.length * 0.72;
  const gap = (width - pad * 2) / data.length;
  let s = `<svg viewBox="0 0 ${width} ${height}" style="width:100%; height:auto; display:block; background:#111111; border-radius:16px;">`;
  s += `<line x1="${pad}" y1="${height-pad}" x2="${width-pad}" y2="${height-pad}" stroke="#444444" stroke-width="1"/>`;
  data.forEach((d, i) => {
    const x = pad + i * gap + (gap - barW) / 2;
    const h = ((height - pad * 2) * d[valueKey]) / max;
    const y = height - pad - h;
    const fill = highlightFn && highlightFn(d, i) ? '#e50914' : '#7f7f7f';
    s += `<rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="6" fill="${fill}"/>`;
    s += `<text x="${x + barW/2}" y="${height - 10}" fill="#cccccc" font-size="11" text-anchor="middle">${d.genre || d.month}</text>`;
  });
  s += `</svg>`;
  return s;
}

function renderInsightsTab() {
  return `
    <div style="display:grid; gap:24px;">
      <div style="display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:16px;">
        ${genreStats.slice(0, 9).map(g => `
          <div style="background:#1b1b1b; border:1px solid #2a2a2a; border-radius:20px; padding:18px;">
            <div style="display:flex; justify-content:space-between; gap:12px; align-items:start; margin-bottom:12px;">
              <div style="font-size:18px; font-weight:800; color:#ffffff;">${g.genre}</div>
              <div style="background:#e50914; color:#ffffff; border-radius:999px; padding:6px 10px; font-size:12px; font-weight:800;">${g.count} films</div>
            </div>
            <div style="display:grid; gap:8px;">
              <div style="font-size:14px; color:#9a9a9a;">Avg revenue</div>
              <div style="font-size:28px; font-weight:900; color:#ffffff;">${formatMoney(g.avgRevenue)}</div>
              <div style="font-size:14px; color:#9a9a9a; margin-top:6px;">Avg ROI</div>
              <div style="font-size:22px; font-weight:800; color:#ffffff;">${formatPct(g.roi)}</div>
            </div>
          </div>
        `).join('')}
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px;">
        <div style="background:#1b1b1b; border:1px solid #2a2a2a; border-radius:20px; padding:20px;">
          <div style="font-size:20px; font-weight:800; margin-bottom:14px;">Revenue by genre</div>
          ${barSvg(genreStats, 'avgRevenue')}
        </div>
        <div style="background:#1b1b1b; border:1px solid #2a2a2a; border-radius:20px; padding:20px;">
          <div style="font-size:20px; font-weight:800; margin-bottom:14px;">ROI by genre</div>
          ${barSvg(genreStats, 'roi')}
        </div>
      </div>

      <div style="background:#1b1b1b; border:1px solid #2a2a2a; border-radius:20px; padding:20px;">
        <div style="font-size:20px; font-weight:800; margin-bottom:8px;">Monthly seasonality</div>
        <div style="font-size:14px; color:#9a9a9a; margin-bottom:14px;">Summer and holiday windows stand out. May–July and November–December are highlighted in red.</div>
        ${barSvg(monthStats, 'avg', d => ['May','Jun','Jul','Nov','Dec'].includes(d.month))}
      </div>
    </div>
  `;
}

function renderTopFilmsTab() {
  const maxRevenue = maxBy(topFilms, 'revenue');
  return `
    <div style="background:#1b1b1b; border:1px solid #2a2a2a; border-radius:20px; padding:20px; overflow:auto;">
      <div style="font-size:22px; font-weight:800; margin-bottom:16px;">Top 20 films by revenue</div>
      <table style="width:100%; border-collapse:collapse; min-width:980px;">
        <thead>
          <tr>
            ${['Rank','Title / Year','Genre','Budget','Revenue','ROI'].map(h => `<th style="text-align:left; padding:12px 10px; color:#9a9a9a; font-size:13px; border-bottom:1px solid #2f2f2f;">${h}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${topFilms.map(f => {
            const roi = ((f.revenue - f.budget) / f.budget) * 100;
            const w = (f.revenue / maxRevenue) * 100;
            return `
              <tr>
                <td style="padding:14px 10px; border-bottom:1px solid #242424; font-weight:800; color:#ffffff;">${f.rank}</td>
                <td style="padding:14px 10px; border-bottom:1px solid #242424; color:#ffffff;"><div style="font-weight:700;">${f.title}</div><div style="font-size:12px; color:#9a9a9a;">${f.year}</div></td>
                <td style="padding:14px 10px; border-bottom:1px solid #242424;"><span style="display:inline-block; background:#e50914; color:#ffffff; border-radius:999px; padding:6px 10px; font-size:12px; font-weight:700;">${f.genre}</span></td>
                <td style="padding:14px 10px; border-bottom:1px solid #242424; color:#ffffff; font-weight:700;">${formatMoney(f.budget)}</td>
                <td style="padding:14px 10px; border-bottom:1px solid #242424; color:#ffffff;">
                  <div style="font-weight:800; margin-bottom:8px;">${formatMoney(f.revenue)}</div>
                  <div style="height:10px; background:#2a2a2a; border-radius:999px; overflow:hidden; width:220px;">
                    <div style="height:10px; width:${w}%; background:#e50914; border-radius:999px;"></div>
                  </div>
                </td>
                <td style="padding:14px 10px; border-bottom:1px solid #242424; color:${roi >= 0 ? '#ffffff' : '#ff9f9f'}; font-weight:800;">${formatPct(roi)}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div style="max-width:1280px; margin:0 auto; padding:28px; box-sizing:border-box;">
      <div style="display:flex; justify-content:space-between; gap:18px; align-items:flex-start; flex-wrap:wrap; margin-bottom:18px;">
        <div>
          <div class="gold-title">Box Office</div>
          <div style="margin-top:10px; font-size:20px; font-weight:800; color:#ffffff; max-width:680px; text-shadow: 0 0 8px rgba(229,9,20,0.6), 0 0 16px rgba(229,9,20,0.4), 0 0 24px rgba(229,9,20,0.25); letter-spacing:0.02em;">Predict the next blockbuster.</div>
        </div>
        <div style="display:flex; gap:12px; flex-wrap:wrap;">
          <div style="background:#1b1b1b; border:1px solid #2a2a2a; color:#ffffff; border-radius:16px; padding:12px 16px; min-width:130px;">
            <div style="font-size:12px; color:#9a9a9a;">Mode</div>
            <div style="font-size:24px; font-weight:900;">${state.predictionMode === 'pre' ? 'Pre' : 'Post'}</div>
          </div>
        </div>
      </div>

      ${renderTabs()}

      ${state.tab === 'predict' ? renderPredictTab() : state.tab === 'insights' ? renderInsightsTab() : renderTopFilmsTab()}
    </div>
  `;
}

function setTab(tab){ state.tab = tab; render(); }
function setPredictionMode(mode){ state.predictionMode = mode; state.prediction = null; render(); }
function updateBudget(v){ state.budget = Math.max(500000, Math.min(380000000, Number(v) || 500000)); }
function updateMonth(v){ state.month = Number(v) || 6; }
function updateRuntime(v){ state.runtime = Number(v) || 110; render(); }
function updateVoteCount(v){ state.voteCount = Number(v) || 0; render(); }
function updateVoteAverage(v){ state.voteAverage = Number(v) || 0; render(); }
function updatePopularity(v){ state.popularity = Number(v) || 0; render(); }
function toggleGenre(g){
  if (state.selectedGenres.includes(g)) state.selectedGenres = state.selectedGenres.filter(x => x !== g);
  else state.selectedGenres = [...state.selectedGenres, g];
  render();
}
function selectStudio(s){ state.selectedStudio = state.selectedStudio === s ? '' : s; render(); }
function selectLanguage(l){ state.selectedLanguage = state.selectedLanguage === l ? '' : l; render(); }
function runPrediction(){ predictRevenue(); render(); }
function resetForm(){
  state.budget = 50000000;
  state.runtime = 110;
  state.month = 6;
  state.selectedGenres = [];
  state.selectedStudio = '';
  state.selectedLanguage = '';
  state.voteCount = 1200;
  state.voteAverage = 6.8;
  state.popularity = 35;
  state.prediction = null;
  render();
}

render();
</script>
